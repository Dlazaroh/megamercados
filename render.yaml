# ─── MegaMercados — render.yaml ───────────────────────────────────────────────
# Infrastructure as Code para Render PaaS
# Referencia: https://render.com/docs/blueprint-spec
#
# Despliegue completo con un solo comando:
#   render blueprint launch
#
# O conectando este repositorio desde:
#   https://dashboard.render.com/blueprints

services:

  # ─────────────────────────────────────────────────────────
  # BACKEND — Django REST Framework (Web Service)
  # ─────────────────────────────────────────────────────────
  - type: web
    name: megamercados-api
    runtime: python
    rootDir: backend
    plan: free                        # Cambiar a "starter" para producción real

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput

    startCommand: >-
      gunicorn megamercados.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120
      --keep-alive 5
      --access-logfile -
      --error-logfile -

    healthCheckPath: /swagger/?format=openapi

    autoDeploy: true                  # Deploy automático en cada git push a main

    envVars:
      # ── Django ──────────────────────────────────────────
      - key: DJANGO_SETTINGS_MODULE
        value: megamercados.settings.production

      - key: PYTHON_VERSION
        value: 3.11.0

      - key: SECRET_KEY
        generateValue: true           # Render genera una clave aleatoria segura

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: megamercados-api.onrender.com

      # ── Base de datos MySQL (PlanetScale / Railway externo) ──
      # Completa estos valores en el dashboard de Render → Environment
      - key: DB_NAME
        sync: false                   # sync: false = se ingresa manualmente en el dashboard

      - key: DB_USER
        sync: false

      - key: DB_PASSWORD
        sync: false

      - key: DB_HOST
        sync: false

      - key: DB_PORT
        value: "3306"

      # ── Redis (Upstash externo) ──────────────────────────
      - key: REDIS_URL
        fromService:
          name: megamercados-redis
          type: redis
          property: connectionString

      # ── Stripe ──────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_PUBLISHABLE_KEY
        sync: false

      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── CORS y Frontend ─────────────────────────────────
      - key: CORS_ALLOWED_ORIGINS
        value: https://megamercados.onrender.com

      - key: FRONTEND_URL
        value: https://megamercados.onrender.com

      # ── JWT ─────────────────────────────────────────────
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"

      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"

  # ─────────────────────────────────────────────────────────
  # FRONTEND — React + Nginx (Static Site)
  # ─────────────────────────────────────────────────────────
  - type: web
    name: megamercados
    runtime: static
    rootDir: frontend
    plan: free

    buildCommand: npm install && npm run build
    staticPublishPath: build

    # Rewrite para React Router SPA (todas las rutas → index.html)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    autoDeploy: true

    headers:
      # Cache largo para assets con hash (JS/CSS compilados)
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Sin cache para index.html (siempre la versión más nueva)
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      # Headers de seguridad
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

    envVars:
      - key: REACT_APP_API_URL
        value: https://megamercados-api.onrender.com/api/v1

      # Ingresa manualmente en el dashboard tras obtener tu clave de Stripe
      - key: REACT_APP_STRIPE_PUBLIC_KEY
        sync: false

  # ─────────────────────────────────────────────────────────
  # REDIS — Cache y broker de Celery (Render Redis)
  # Disponible en plan Starter ($10/mes). Para plan free usa Upstash externo.
  # ─────────────────────────────────────────────────────────
  - type: redis
    name: megamercados-redis
    plan: free                        # "free" tiene límite de 25MB — suficiente para dev
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []                   # Lista vacía = solo servicios internos de Render
